name: consume

on:
  schedule:
    - cron: '0 */6 * * *'      # 00, 06, 12, 18 UTC
  workflow_dispatch:
    inputs:
      run_seconds:
        description: 'Wall-clock budget for this run (seconds)'
        required: false
        default: '20700'        # 5h45m
      offset_reset:
        description: 'auto.offset.reset on first connect (earliest|latest)'
        required: false
        default: 'earliest'
      transport:
        description: 'kafka or ws'
        required: false
        default: 'kafka'
      topics:
        description: 'Comma-separated topics. Default = newly_registered_domain only. Use newly_registered_domain,newly_registered_fqdn for FQDN firehose; zone_diff requires auth.'
        required: false
        default: 'newly_registered_domain'

concurrency:
  group: zonestream-consume
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  consume:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # 5h50m, leaves room for commit/push
    env:
      # Default = the small, signal-rich topic. newly_registered_fqdn is a
      # wildcard-heavy firehose (~10x volume) and zone_diff requires auth.
      # Override per run via the topics input or globally via vars.ZS_TOPICS.
      ZS_TOPICS: ${{ inputs.topics || vars.ZS_TOPICS || 'newly_registered_domain' }}
      # Group id is not a secret — it just labels your consumer offsets on the
      # broker. Override it in repo *Variables* (not Secrets) if you want.
      ZS_GROUP_ID: ${{ vars.ZS_GROUP_ID || format('gha-archive-{0}', github.repository_id) }}
      ZS_RUN_SECONDS: ${{ inputs.run_seconds || '20700' }}
      ZS_OFFSET_RESET: ${{ inputs.offset_reset || 'earliest' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'consumer/requirements.txt'

      - name: Install dependencies
        run: pip install -r consumer/requirements.txt

      - name: Consume (kafka)
        if: ${{ inputs.transport != 'ws' }}
        run: python consumer/kafka_consumer.py

      - name: Consume (websocket fallback)
        if: ${{ inputs.transport == 'ws' }}
        run: python consumer/ws_consumer.py

      - name: Show what changed
        if: always()
        run: |
          du -sh data/ 2>/dev/null || true
          git status --short || true

      - name: Commit hourly partitions
        if: always()
        run: |
          set -e
          git config user.name  "zonestream-bot"
          git config user.email "zonestream-bot@users.noreply.github.com"
          git add -A data/ state/
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "data: $(date -u +%FT%H:%MZ) batch (run ${GITHUB_RUN_ID})"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && \
              git push origin "HEAD:${GITHUB_REF_NAME}" && exit 0
            sleep $((i * 5))
          done
          exit 1
