name: reaper

on:
  schedule:
    - cron: '15 * * * *'        # every hour at :15
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write                # to dispatch consume.yml

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Daily cadence: tolerate up to 36 h before paging (allows one full
      # missed cycle plus GitHub cron drift).
      ZS_STALE_HOURS: '36'
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 200       # enough to find recent zonestream-bot commits
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python consumer/reaper.py
