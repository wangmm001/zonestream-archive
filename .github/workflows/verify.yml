name: verify

on:
  schedule:
    - cron: '30 1 * * *'        # daily 01:30 UTC, 80 min after rollover
  workflow_dispatch:
    inputs:
      day:
        description: 'YYYY-MM-DD to verify (default: yesterday UTC)'
        required: false
      sample_rate:
        description: 'Fraction of lines to schema-validate (0..1]'
        required: false
        default: '0.01'

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ZS_TOPICS: 'newly_registered_domain,newly_registered_fqdn,confirmed_newly_registered_domain'
      ZS_DAY: ${{ inputs.day }}
      SAMPLE_RATE: ${{ inputs.sample_rate || '0.01' }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'consumer/requirements.txt'
      - run: pip install -r consumer/requirements.txt

      - name: Verify
        id: verify
        run: python consumer/verify.py
        continue-on-error: true

      - name: File issue on failure
        if: steps.verify.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DAY="${ZS_DAY:-$(date -u -d 'yesterday' +%F)}"
          gh issue create \
            --title "verify failed for snap-${DAY}" \
            --label "verify-failure" \
            --body "Run: <https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}>"
          exit 1
